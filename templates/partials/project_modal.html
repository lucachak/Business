<div class="modal-backdrop" id="modal-backdrop" onclick="this.style.opacity='0'; setTimeout(() => this.remove(), 300)">
    <div class="modal-card" onclick="event.stopPropagation()">
        
        <div class="modal-image" style="background-image: url('{{ project.image }}');">
            <button class="close-btn" onclick="document.getElementById('modal-backdrop').style.opacity='0'; setTimeout(() => document.getElementById('modal-backdrop').remove(), 300)">×</button>
        </div>

        <div class="modal-info">
            <h3 class="modal-title" data-i18n="modal_title_{{ project.id }}">{{ project.title }}</h3>
            <p class="modal-subtitle" data-i18n="modal_sub_{{ project.id }}">{{ project.subtitle }}</p>
            </div>
    </div>
</div>

<style>
/* CSS do Modal Animado injetado junto com o HTML */
#modal-backdrop {
    opacity: 0; /* Começa invisível */
    transition: opacity 0.3s ease;
}
.modal-card {
    transform: translateY(20px);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
#modal-backdrop.show {
    opacity: 1; /* Adicionamos a classe 'show' no load */
}
#modal-backdrop.show .modal-card {
    transform: translateY(0);
}
</style>

<script>
    // Esse script vai rodar apenas uma vez quando o HTMX injetar o modal
    setTimeout(() => {
        document.getElementById('modal-backdrop').classList.add('show');
    }, 10);
</script>
